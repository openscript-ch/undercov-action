name: Create Release Tag

on:
  pull_request:
    types:
      - closed

permissions:
  contents: write

jobs:
  tag-release:
    name: Tag merged release PR
    if: github.event.pull_request.merged == true && github.event.pull_request.base.ref == 'main' && startsWith(github.event.pull_request.head.ref, 'release')
    runs-on: srv-obin-ch_ubuntu-latest
    outputs:
      version: ${{ steps.create-tag.outputs.tag_name }}

    steps:
      - name: Checkout code
        uses: https://code.forgejo.org/actions/checkout@v7
        with:
          fetch-depth: 0
          ref: main

      - name: Create and push tag
        id: create-tag
        env:
          PUSH_TOKEN: ${{ secrets.RELEASE_BOT_TOKEN }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
          MERGE_SHA: ${{ github.event.pull_request.merge_commit_sha }}
        run: |
          set -euo pipefail

          if [[ -z "${PUSH_TOKEN}" ]]; then
            echo "RELEASE_BOT_TOKEN secret is not set." >&2
            echo "A personal access token is required to push tags that trigger workflows." >&2
            echo "The default workflow token cannot trigger downstream workflow runs." >&2
            exit 1
          fi

          TAG_NAME="${HEAD_REF#release/}"

          if [[ ! "${TAG_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid tag name derived from release branch: ${TAG_NAME}" >&2
            exit 1
          fi

          VERSION_CORE="${TAG_NAME#v}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "${VERSION_CORE}"
          MAJOR_TAG="v${MAJOR}"
          MINOR_TAG="v${MAJOR}.${MINOR}"

          if git rev-parse -q --verify "refs/tags/${TAG_NAME}" >/dev/null; then
            echo "Tag ${TAG_NAME} already exists, skipping."
            echo "tag_name=" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          git config user.name "openscript-bot"
          git config user.email "r+codebergbot@obin.ch"

          git tag -a "${TAG_NAME}" "${MERGE_SHA}" -m "Release ${TAG_NAME}"
          git -c http.extraheader="Authorization: token ${PUSH_TOKEN}" push origin "refs/tags/${TAG_NAME}"

          # Keep moving major/minor tags in sync with the latest patch release.
          git tag -fa "${MAJOR_TAG}" "${MERGE_SHA}" -m "Release line ${MAJOR_TAG}"
          git tag -fa "${MINOR_TAG}" "${MERGE_SHA}" -m "Release line ${MINOR_TAG}"
          git -c http.extraheader="Authorization: token ${PUSH_TOKEN}" push --force origin "refs/tags/${MAJOR_TAG}"
          git -c http.extraheader="Authorization: token ${PUSH_TOKEN}" push --force origin "refs/tags/${MINOR_TAG}"

          echo "tag_name=${TAG_NAME}" >> "${GITHUB_OUTPUT}"
